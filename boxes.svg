<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <title>Boxes</title>
  <defs>
    <pattern id="checker" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="10" fill="#fff"/>
      <rect x="10" y="10" width="10" height="10" fill="#fff"/>
    </pattern>
  </defs>
  <rect width="300" height="300" fill="url(#checker)"/>
</svg>
